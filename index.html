<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="수영구술"/>
<meta name="description" content="2급 생활스포츠지도사 수영 구술시험 실전 연습"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="public/icon-192.png"/>
<title>수영 구술 연습</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;--bg4:#e0e0de;
  --text:#1a1a1a;--text2:#555552;--text3:#999996;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --info-bg:#e6f1fb;--info-txt:#0c447c;
  --ok-bg:#e1f5ee;--ok-txt:#0f6e56;--ok-mid:#1d9e75;
  --warn-bg:#faeeda;--warn-txt:#854f0b;--warn-mid:#ba7517;
  --err-bg:#faece7;--err-txt:#993c1d;--err-mid:#d85a30;
  --blue:#378add;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--bg4:#48484a;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --info-bg:#0c2a4a;--info-txt:#7ab8f5;
  --ok-bg:#0a2e22;--ok-txt:#5fd4a8;
  --warn-bg:#2e1f00;--warn-txt:#f5c75a;
  --err-bg:#2e1209;--err-txt:#f5825a;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}
#app{max-width:480px;margin:0 auto;min-height:100%;background:var(--bg3);display:flex;flex-direction:column}

.hdr{background:var(--bg);border-bottom:0.5px solid var(--border);padding:env(safe-area-inset-top,0) 0 0;position:sticky;top:0;z-index:100}
.hdr-inner{padding:12px 16px 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr h1{font-size:17px;font-weight:600;color:var(--text)}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--info-bg);color:var(--info-txt);font-weight:500}
.tab-row{display:flex}
.tab{flex:1;text-align:center;font-size:13px;padding:8px 0;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;font-weight:400}
.tab.on{color:var(--text);border-bottom-color:var(--text);font-weight:600}

.scr{display:none;padding:16px 16px calc(16px + env(safe-area-inset-bottom,0));flex:1}
.scr.on{display:block}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg);border-radius:var(--r);padding:10px 6px;text-align:center}
.stat .n{font-size:18px;font-weight:600;color:var(--text)}
.stat .l{font-size:10px;color:var(--text2);margin-top:2px}

.btn-big{width:100%;padding:14px;border-radius:var(--rl);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-bottom:10px}
.btn-big.pri{background:var(--text);color:var(--bg)}
.btn-big.sec{background:var(--bg);color:var(--text);border:1px solid var(--border2)}
.btn-big:active{opacity:.75}

.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.set-card{background:var(--bg);border-radius:var(--rl);padding:14px;border:1px solid var(--border);cursor:pointer}
.set-card:active{opacity:.7}
.set-card.done{border-color:var(--ok-mid)}
.set-num{font-size:11px;color:var(--text3);margin-bottom:3px}
.set-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:8px;color:var(--text)}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:20px}
.tag-r{background:var(--info-bg);color:var(--info-txt)}
.tag-g{background:var(--ok-bg);color:var(--ok-txt)}
.set-score{font-size:11px;color:var(--ok-mid);margin-top:6px;font-weight:500}

.card{background:var(--bg);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.prog-row{display:flex;gap:5px;margin-bottom:14px}
.pstep{flex:1;height:4px;border-radius:2px;background:var(--bg3)}
.pstep.cur{background:var(--blue)}.pstep.done{background:var(--ok-mid)}

.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-domain{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.q-pts{font-size:11px;color:var(--text2);margin-left:auto}
.q-num{font-size:11px;color:var(--text3)}
.q-txt{font-size:15px;font-weight:600;line-height:1.55;margin-bottom:14px;color:var(--text)}

.tts-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--info-bg);border-radius:var(--r);margin-bottom:12px}
.tts-bar span{font-size:12px;color:var(--info-txt);flex:1}

.mode-row{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;padding:8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer}
.mode-btn.on{background:var(--bg);border-color:var(--border2);color:var(--text);font-weight:600}

textarea{width:100%;min-height:90px;resize:none;font-size:14px;font-family:inherit;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);line-height:1.55}
textarea:focus{outline:none;border-color:var(--border2)}
textarea:disabled{opacity:.6}

.voice-box{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.voice-btns{display:flex;gap:8px;margin-bottom:8px}
.btn-v{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit}
.btn-v.rec{background:var(--err-bg);border-color:var(--err-mid);color:var(--err-txt);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.v-status{font-size:12px;color:var(--text2);min-height:16px;margin-bottom:6px}
.transcript{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;min-height:70px;font-size:13px;color:var(--text);line-height:1.55;white-space:pre-wrap}

.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{padding:10px 14px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;flex:1;font-family:inherit}
.btn:active{opacity:.7}
.btn.pri{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.sm{flex:none;padding:8px 14px;font-size:12px}
.btn:disabled{opacity:.35;cursor:not-allowed}

.score-panel{margin-top:12px}
.score-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.score-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:2.5px solid}
.sc-n{font-size:22px;font-weight:700;line-height:1}
.sc-u{font-size:11px;margin-top:2px}
.score-grade{font-size:16px;font-weight:600}
.score-sub{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.score-bar{height:6px;background:var(--bg3);border-radius:3px;margin:10px 0;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .7s}

.judge-box{background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px}
.judge-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px}
.judge-txt{font-size:13px;color:var(--text);line-height:1.65}

.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fb-cell{border-radius:var(--r);padding:10px 12px}

.kw-section{margin-bottom:10px}
.kw-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px}
.kw-row{display:flex;flex-wrap:wrap;gap:5px}
.kw{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.kw-ok{background:var(--ok-bg);color:var(--ok-txt)}
.kw-miss{background:var(--err-bg);color:var(--err-txt)}

.ans-box{background:var(--bg2);border-radius:var(--r);padding:12px;margin-top:10px}
.ans-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px}
.ans-txt{font-size:13px;color:var(--text);line-height:1.6}
.memo-wrap{background:var(--bg3);border-radius:var(--r);padding:10px 12px;margin-top:8px}
.memo-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.memo-txt{font-size:12px;color:var(--text);font-weight:500;line-height:1.65}

.nav-row{display:flex;gap:8px;margin-top:12px}

.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-item{background:var(--bg2);border-radius:var(--r);padding:14px}
.sum-n{font-size:26px;font-weight:700}
.sum-l{font-size:11px;color:var(--text2);margin-top:2px}
.q-res-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.q-res-item{background:var(--bg2);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--text)}

.hist-item{padding:12px 0;border-bottom:0.5px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-title{font-size:13px;font-weight:600;color:var(--text)}
.hist-meta{font-size:12px;color:var(--text2);margin-top:3px;display:flex;gap:8px;align-items:center}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.pill-c{background:var(--ok-bg);color:var(--ok-txt)}
.pill-w{background:var(--err-bg);color:var(--err-txt)}

.empty{text-align:center;padding:3rem 0;color:var(--text2);font-size:14px;line-height:1.8}
.sec-lbl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px}
.loading-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);padding:16px 0}
.dots{display:inline-flex;gap:3px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--text2);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<div id="app">

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">
      <h1>수영 구술 연습</h1>
      <span class="badge">2급 생활스포츠지도사</span>
    </div>
    <div class="tab-row">
      <button class="tab on" onclick="go('home')">홈</button>
      <button class="tab" onclick="go('practice')">세트 연습</button>
      <button class="tab" onclick="go('history')">기록</button>
    </div>
  </div>
</div>

<div id="scr-home" class="scr on">
  <div class="stats">
    <div class="stat"><div class="n" id="st-sets">0</div><div class="l">완료 세트</div></div>
    <div class="stat"><div class="n" id="st-avg">-</div><div class="l">평균 점수</div></div>
    <div class="stat"><div class="n" id="st-pass">0</div><div class="l">합격권</div></div>
    <div class="stat"><div class="n" id="st-best">-</div><div class="l">최고 점수</div></div>
  </div>
  <button class="btn-big pri" onclick="startRandom()">랜덤 세트 시작 →</button>
  <p class="sec-lbl">세트별 연습</p>
  <div class="set-grid" id="set-grid"></div>
</div>

<div id="scr-practice" class="scr">
  <div id="practice-inner"><div class="empty">홈에서 세트를 선택하세요.</div></div>
</div>

<div id="scr-history" class="scr">
  <div id="hist-inner"></div>
</div>

</div>
<script>
const ALL_Q=[
  {id:'q1',type:'규정',sub:'시설·도구',pts:25,q:'올림픽 수영장의 규격(길이, 너비, 깊이, 레인 수, 레인 너비, 양끝 공간)을 설명하시오.',a:'올림픽 수영장은 길이 50m, 고정 수영장 최소 너비 25m, 최소 수심 2.5m입니다. 8개 레인을 사용하며 각 레인 너비는 2.5m이고, 1번과 8번 레인 바깥쪽에 레인 로프로 구분된 각각 2.5m 빈 공간을 두어야 합니다.',kw:['50m','25m','2.5m','8레인','양끝 2.5m'],memo:'50m × 25m × 2.5m / 8레인 × 2.5m / 양끝 2.5m 공간'},
  {id:'q2',type:'규정',sub:'시설·도구',pts:25,q:'출발대(스타팅 블록)의 규격 요건을 설명하시오.',a:'출발대는 견고하고 탄성이 없어야 하며, 수면으로부터 높이는 0.5~0.75m, 표면적은 0.5m×0.5m 이상이어야 합니다. 표면은 미끄럼 방지 재질이어야 하고, 기울기는 최대 10도 이내입니다.',kw:['탄성 없음','0.5~0.75m','0.5×0.5m','미끄럼 방지','10도'],memo:'높이 0.5~0.75m / 면적 0.5×0.5m / 미끄럼방지 / 기울기 최대 10도'},
  {id:'q3',type:'규정',sub:'시설·도구',pts:25,q:'수영장 수온 규정과 수온이 수영에 미치는 영향을 설명하시오.',a:'WA 규정에 따르면 수영장 수온은 섭씨 25~28도 사이여야 합니다. 낮으면 체온 저하와 근육 수축으로 부상 위험이 높아지고, 높으면 물의 밀도가 낮아져 부력이 줄며 심박수가 증가합니다.',kw:['25~28도','근육 수축','부상','부력','심박수'],memo:'25~28°C / 낮으면: 근육수축·부상 / 높으면: 밀도↓·부력↓·심박수↑'},
  {id:'q4',type:'규정',sub:'시설·도구',pts:25,q:'배영 반환선(깃발) 설치 규정을 설명하시오.',a:'배영 반환선은 각 벽면으로부터 5m 떨어진 지점, 수면으로부터 1.8m 높이에 수영장 좌우를 가로질러 설치합니다. 벽에서 15m 지점의 양측면에도 눈에 띄는 표시를 해야 합니다.',kw:['5m','1.8m','15m'],memo:'벽에서 5m / 수면에서 1.8m / 15m 지점 별도 표시'},
  {id:'q5',type:'규정',sub:'시설·도구',pts:25,q:'올림픽 및 세계선수권대회 수영장의 조도 규정을 설명하시오.',a:'올림픽 및 세계선수권대회의 경우 수영장 전체 조도는 1500 lux 이상입니다. 그 외 대회에서는 출발선과 반환점 조도가 600 lux 이상이어야 합니다.',kw:['1500 lux','600 lux','바닥 기준'],memo:'올림픽·세선대회=전체 1500lux / 그외=출발·반환점 600lux'},
  {id:'q6',type:'규정',sub:'시설·도구',pts:25,q:'레인로프의 기능과 올림픽 경기에서의 색상 규정을 설명하시오.',a:'레인로프는 레인을 구분하고 파도를 줄이는 역할을 합니다. 올림픽에서 1·8번은 초록색, 2·3·6·7번은 파란색, 4·5번은 노란색이며 양끝 5m는 빨간색입니다.',kw:['파도 감소','초록','파란','노란','빨간'],memo:'기능: 구분+파도감소 / 1·8=초록, 2·3·6·7=파랑, 4·5=노랑, 양끝5m=빨강'},
  {id:'q7',type:'규정',sub:'경기운영',pts:25,q:'부정출발(False Start)의 처리 방법을 설명하시오.',a:'출발신호 전 출발 동작을 시작하면 실격될 수 있습니다. 실격 선언 전에 출발신호가 울렸다면 경기는 진행되고 종료 후 실격 처리합니다. 출발신호 전에 실격이 선언되면 나머지 선수들을 다시 대기시키고 출발 절차를 다시 진행합니다.',kw:['출발신호 전','실격','경기 후 실격','재출발'],memo:'신호 전 → 실격 가능 / 신호 후 실격선언 → 경기진행+나중에실격 / 신호 전 실격선언 → 재출발'},
  {id:'q8',type:'규정',sub:'경기운영',pts:25,q:'자유형 스타트 및 턴 후 잠영 허용 기준과 결승점 잠수 규정을 설명하시오.',a:'출발 및 턴 후 15m까지 잠영이 허용되며 15m 전에 머리가 수면 위로 나와야 합니다. 2026년 개정된 WA 규정에 따라 결승점 5m 전에 머리가 통과한 경우 잠수가 허용됩니다.',kw:['15m','잠영','머리 출수','5m','결승점'],memo:'출발·턴 후 15m 잠영 / 15m전 머리 출수 / 결승점 5m 전 잠수 허용'},
  {id:'q9',type:'규정',sub:'경기운영',pts:25,q:'평영 출발 및 턴 후 허용되는 잠영 동작과 머리 출수 규정을 설명하시오.',a:'출발 후와 각 턴 후, 잠수 상태로 한 번의 암 스트로크가 허용되고, 첫 번째 평영 킥 전에 한 번의 돌핀킥이 허용됩니다. 두 번째 암 스트로크 중 팔이 가장 넓게 벌어진 후 안쪽으로 모아지기 전에 머리가 수면 밖으로 나와야 합니다.',kw:['암 스트로크 1회','돌핀킥 1회','두 번째','머리 출수'],memo:'암스트로크 1회 + 돌핀킥 1회 → 2번째 스트로크 전 머리 출수'},
  {id:'q10',type:'규정',sub:'경기운영',pts:25,q:'배영 경기의 턴 방법과 잠영 허용 기준을 설명하시오.',a:'턴 시 신체 일부가 벽에 닿아야 하며, 어깨를 돌려 가슴이 바닥을 향하게 한 후 즉시 싱글 암풀 또는 더블 암풀로 턴하고, 벽을 떠날 때 등을 댄 누운 자세로 돌아와야 합니다. 출발 및 턴 후 15m까지 잠영이 허용되며 결승점 5m 전 잠수가 허용됩니다.',kw:['벽 터치','싱글/더블 암풀','등 누운 자세','15m','5m'],memo:'터치→싱글or더블 암풀→등 누운 자세 / 잠영 15m / 결승 5m 전 잠수 허용'},
  {id:'q11',type:'규정',sub:'경기운영',pts:25,q:'혼계영의 영법 순서, 특징, 자유형 구간 제한을 설명하시오.',a:'혼계영은 4명이 배영, 평영, 접영, 자유형 순서로 각 1/4씩 완주합니다. 배영 영자가 1번으로 물속에서 출발합니다. 자유형 구간에서는 배영·평영·접영을 제외한 영법을 사용해야 합니다.',kw:['배평접자','물속 출발','자유형 제한','400m'],memo:'배→평→접→자 / 배영 선수 물속 출발 / 자유형 구간: 3영법 제외'},
  {id:'q12',type:'규정',sub:'경기운영',pts:25,q:'계영 선수교대(릴레이 터치) 규정과 실격 사유를 설명하시오.',a:'선행선수가 벽을 터치할 때까지 다음 선수의 발이 출발대에 닿아 있어야 합니다. 반드시 출발대 위에서 교대해야 하며, 실격 사유는 발이 먼저 떨어진 경우, 데크에서 달려 출발한 경우, 순서를 위반한 경우입니다.',kw:['발','출발대','터치 전','달려서 출발','순서 위반'],memo:'선행 터치 전까지 발이 출발대에 / 실격: ①발 먼저 떨어짐 ②달려서출발 ③순서 위반'},
  {id:'q13',type:'규정',sub:'경기운영',pts:25,q:'접영 규정에서 팔 동작, 발차기, 피니시 규정과 실격 사유를 설명하시오.',a:'양팔은 수면 위에서 동시에 앞으로, 수면 아래에서 동시에 뒤로 당겨야 합니다. 양다리 상하 동작을 동시에 해야 하며 엇갈리거나 평영 발차기는 금지됩니다. 피니시는 양손을 분리하여 동시에 터치해야 합니다.',kw:['양팔 동시','양다리 동시','분리 동시 터치','평영킥 금지'],memo:'팔: 동시·앞-뒤 / 발: 동시 상하 / 터치: 분리·동시 / 실격: 교대팔·평영킥·비동시터치'},

  {id:'q16',type:'지도방법',sub:'도구·스트로크',pts:25,q:'접영 발차기(돌핀킥)의 두 가지 종류와 타이밍을 설명하시오.',a:'접영 발차기에는 다운킥과 업킥이 있으며 1회 팔 돌리기에 2회 발차기를 합니다. 첫 번째(입수킥)는 엔트리 타이밍에, 두 번째(출수킥)는 피니시 타이밍에 실시합니다. 다운킥은 상체를 물속으로, 업킥은 몸을 수면 위로 밀어냅니다.',kw:['다운킥','업킥','엔트리 타이밍','피니시 타이밍','2회'],memo:'2회킥 / 1번째=엔트리 타이밍 / 2번째=피니시 타이밍'},

  {id:'q18',type:'지도방법',sub:'도구·스트로크',pts:25,q:'자유형 2비트킥과 6비트킥의 차이점과 활용 상황을 설명하시오.',a:'6비트킥은 양팔 1회 스트로크 동안 6번 차서 강한 추진력을 발생시키지만 체력 소모가 크므로 단거리에 주로 사용합니다. 2비트킥은 발차기 횟수가 적어 에너지를 절약하므로 장거리 수영에 사용합니다.',kw:['6비트킥','단거리','추진력','2비트킥','장거리','에너지 절약'],memo:'6비트킥=6회·강한추진·단거리 / 2비트킥=2회·절약·장거리'},
  {id:'q19',type:'지도방법',sub:'도구·스트로크',pts:25,q:'수영에서 저항을 줄이는 방법을 저항 종류별로 설명하시오.',a:'파동저항을 줄이려면 잠영을 길게 하고 입수와 발차기를 부드럽게 합니다. 형태저항과 견인저항을 줄이려면 유선형 자세를 만듭니다. 마찰저항을 줄이려면 전신 면도를 하거나 밀착성 좋은 수영복을 사용합니다.',kw:['파동저항','형태저항','마찰저항','유선형','잠영'],memo:'파동: 잠영+부드러운입수 / 형태·견인: 유선형 / 마찰: 면도·밀착수영복'},
  {id:'q20',type:'지도방법',sub:'지도대상별',pts:25,q:'초보자에게 수영을 지도할 때 강습 순서와 주의사항을 설명하시오.',a:'물과 친해지기 → 호흡하기 → 물에 뜨기 → 발차기 → 팔 돌리기 순서로 분습법으로 지도한 뒤, 숙달되면 전습법으로 콤비네이션을 지도합니다. 알아듣기 쉬운 용어를 사용하고 연령·성별·체력·장애 유무에 따라 난이도를 조절합니다.',kw:['물 친해지기','호흡','뜨기','발차기','팔돌리기','분습법','전습법','콤비네이션'],memo:'물친→호흡→뜨기→발차기→팔돌리기→콤비네이션 / 분습→전습 / 대상별 난이도 조절'},
  {id:'q21',type:'지도방법',sub:'지도대상별',pts:25,q:'배영에서 학생이 숨이 잘 안 쉬어질 때 지도 방법 2가지를 설명하시오.',a:'첫째, 허리 정도 수심에서 지도자가 교육생의 다리를 옆구리에 낀 상태로 발목을 잡고 한팔씩 스트로크하며 호흡법을 연습시킵니다. 둘째, 배면뜨기 자세로 킥판을 가슴에 안고 호흡법을 연습시킵니다. 크롤처럼 음파호흡법을 사용합니다.',kw:['다리 잡기','킥판','배면뜨기','음파호흡'],memo:'① 지도자 다리 잡고 한팔씩 ② 킥판 가슴에 안고 배면뜨기 → 음파호흡법'},
  {id:'q22',type:'지도방법',sub:'지도대상별',pts:25,q:'분습법과 전습법을 설명하고 수영 지도에서의 활용 예시를 드시오.',a:'분습법은 초보자나 새로운 운동을 배울 때 각 부분 동작을 분리하여 연습하는 방법입니다. 전습법은 부분 동작이 숙달된 후 여러 동작을 연결하여 연습하는 방법입니다. 자유형 지도 시 발차기·팔돌리기·호흡을 각각 익힌 후 전습법으로 연결합니다.',kw:['분습법','전습법','부분 동작','연결','숙달'],memo:'분습법=부분동작 분리 / 전습법=숙달 후 연결 / 발차기→팔돌리기→호흡→연결'},
  {id:'q23',type:'지도방법',sub:'지도대상별',pts:25,q:'수영 중 부상 발생 시 PRICE 요법을 설명하시오.',a:'P는 Protection(보호), R은 Rest(휴식), I는 Ice(냉찜질)로 염증 완화와 통증 감소, C는 Compression(압박), E는 Elevation(거상)으로 부상 부위를 심장보다 높게 올립니다.',kw:['Protection','Rest','Ice','Compression','Elevation'],memo:'P=보호 / R=휴식 / I=냉찜질 / C=압박 / E=심장보다 높게'},
  {id:'q24',type:'지도방법',sub:'지도대상별',pts:25,q:'준비운동과 정리운동의 효과를 각각 설명하시오.',a:'준비운동은 체온 상승, 혈액순환, 유연성과 관절 가동성을 높여 부상을 예방합니다. 정리운동은 운동으로 생성된 젖산 등 부산물 처리를 돕고 심박수와 호흡을 정상 상태로 회복시킵니다.',kw:['체온 상승','혈액순환','유연성','부상 예방','젖산','심박수 회복'],memo:'준비운동: 체온↑·혈액순환·유연성→부상예방 / 정리운동: 젖산 처리·심박수·호흡 정상화'},
  {id:'q25',type:'지도방법',sub:'지도대상별',pts:25,q:'생활체육 지도자의 역할과 자질을 설명하시오.',a:'역할은 운동기능 전수, 전문지식 전달, 운동처방, 시설 운영·관리 등이 있습니다. 자질로는 도덕적 품성과 확고한 신념, 사명감, 성실성과 책임감, 스포츠 지식과 기술, 의사전달 능력, 공정성이 필요합니다.',kw:['운동기능 전수','운동처방','사명감','책임감','공정성'],memo:'역할: 기능전수·전문지식·운동처방·시설관리 / 자질: 사명감·책임감·지식·기술·공정성'}
];

const FIXED_SETS=[
  {id:1,title:'기본 규정 + 초보자 지도'},
  {id:2,title:'영법 규정 + 스트로크 지도'},
  {id:3,title:'수영장 시설 + 영법 지도'},
  {id:4,title:'배영·접영 규정 + 안전'},
  {id:5,title:'계영·혼영 규정 + 체력'},
  {id:6,title:'접영·자유형 + 이론'}
];

function makeSet(){
  const sh=a=>{const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;};
  const reg=sh(ALL_Q.filter(q=>q.type==='규정')).slice(0,2);
  const gui=sh(ALL_Q.filter(q=>q.type==='지도방법')).slice(0,2);
  return [...reg,...gui].map((q,i)=>({...q,pts:[20,30,20,30][i]}));
}
let CACHE={};
function getSet(id){if(!CACHE[id])CACHE[id]=makeSet();return CACHE[id];}

let ST={
  activeSet:null,activeQs:null,qIdx:0,
  answers:[],scores:[],submitted:[],feedback:{},kwRes:{},
  results:JSON.parse(localStorage.getItem('swim_pwa_v5')||'[]'),
  inputMode:'text',rec:null,isRec:false,transcript:''
};
function save(){try{localStorage.setItem('swim_pwa_v5',JSON.stringify(ST.results));}catch(e){}}

function go(t){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-'+t).classList.add('on');
  ['home','practice','history'].forEach((n,i)=>{if(n===t)document.querySelectorAll('.tab')[i].classList.add('on');});
  if(t==='home')renderHome();
  if(t==='history')renderHistory();
  window.scrollTo(0,0);
}

function renderHome(){
  const sc=ST.results.map(r=>r.total);
  const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
  const pass=sc.filter(s=>s>=70).length;
  const best=sc.length?Math.max(...sc):null;
  document.getElementById('st-sets').textContent=ST.results.length;
  document.getElementById('st-avg').textContent=avg!==null?avg+'점':'-';
  document.getElementById('st-pass').textContent=pass+'회';
  document.getElementById('st-best').textContent=best!==null?best+'점':'-';
  document.getElementById('set-grid').innerHTML=FIXED_SETS.map(s=>{
    const last=ST.results.filter(r=>r.setId===s.id).slice(-1)[0];
    return `<div class="set-card${last?' done':''}" onclick="startSet(${s.id})">
      <div class="set-num">세트 ${s.id}</div>
      <div class="set-title">${s.title}</div>
      <div class="tags"><span class="tag tag-r">규정 2문제</span><span class="tag tag-g">지도 2문제</span></div>
      ${last?`<div class="set-score">최근 ${last.total}점 ${last.total>=70?'합격':'불합격'}</div>`:''}
    </div>`;
  }).join('');
}

function startRandom(){
  const id=Math.floor(Math.random()*FIXED_SETS.length)+1;
  CACHE[id]=makeSet();startSet(id);
}

function startSet(id){
  ST.activeSet=FIXED_SETS.find(s=>s.id===id);
  ST.activeQs=getSet(id);
  ST.qIdx=0;
  ST.answers=new Array(4).fill('');
  ST.scores=new Array(4).fill(null);
  ST.submitted=new Array(4).fill(false);
  ST.feedback={};ST.kwRes={};
  stopRec();go('practice');renderQ();
}

function sc2color(sc){return sc>=90?'#1d9e75':sc>=70?'#378add':sc>=50?'#ba7517':'#d85a30';}
function sc2grade(sc){return sc>=90?'매우 우수':sc>=80?'우수':sc>=70?'합격':sc>=60?'보통':sc>=50?'미흡':'재학습 필요';}

function renderQ(){
  if(!ST.activeSet||!ST.activeQs)return;
  const i=ST.qIdx;const q=ST.activeQs[i];const done=ST.submitted[i];
  const dc=q.type==='규정'?'background:var(--info-bg);color:var(--info-txt)':'background:var(--ok-bg);color:var(--ok-txt)';
  const steps=ST.activeQs.map((_,j)=>`<div class="pstep ${j<i?'done':j===i?'cur':''}"></div>`).join('');
  let body='';

  if(!done){
    const tts=`<div class="tts-bar">
      <span>문제 읽어주기</span>
      <button class="btn sm" onclick="speakQ()">▶ 듣기</button>
      <button class="btn sm" onclick="stopTTS()">■ 중지</button>
    </div>`;
    const modeBar=`<div class="mode-row">
      <button class="mode-btn ${ST.inputMode==='text'?'on':''}" onclick="setMode('text')">텍스트 입력</button>
      <button class="mode-btn ${ST.inputMode==='voice'?'on':''}" onclick="setMode('voice')">음성 말하기</button>
    </div>`;
    const inp=ST.inputMode==='text'
      ?`<textarea id="ans" placeholder="핵심 개념 위주로 답변을 작성하세요. 완벽한 문장이 아니어도 됩니다.">${ST.answers[i]}</textarea>`
      :`<div class="voice-box">
          <div class="voice-btns">
            <button class="btn-v ${ST.isRec?'rec':''}" id="btn-rec" onclick="toggleRec()">${ST.isRec?'⏹ 녹음 중단':'⏺ 녹음 시작'}</button>
            <button class="btn-v" onclick="clearT()">초기화</button>
          </div>
          <div class="v-status" id="v-st">${ST.isRec?'인식 중...':'마이크 버튼을 눌러 답변을 말하세요.'}</div>
          <div class="transcript" id="t-box">${ST.transcript||'(음성 인식 결과가 여기에 표시됩니다)'}</div>
        </div>`;
    body=tts+modeBar+inp+`<div class="btn-row">
      <button class="btn" onclick="showOnly(${i})">모범 답안</button>
      <button class="btn pri" id="btn-g" onclick="gradeQ(${i})">AI 심사위원 채점</button>
    </div>`;
  }

  if(done){
    const sc=ST.scores[i]||0;const fc=sc2color(sc);const gr=sc2grade(sc);
    const kwr=ST.kwRes[i]||{ok:[],miss:[]};const fb=ST.feedback[i]||{};
    body=`<div class="score-panel">
      <div class="score-top">
        <div class="score-circle" style="border-color:${fc}">
          <span class="sc-n" style="color:${fc}">${sc}</span>
          <span class="sc-u" style="color:${fc}">점</span>
        </div>
        <div>
          <div class="score-grade" style="color:${fc}">${gr}</div>
          <div class="score-sub">${q.pts}점 배점 · AI 심사위원 평가</div>
        </div>
      </div>
      <div class="score-bar"><div class="score-fill" style="width:${sc}%;background:${fc}"></div></div>
      ${fb.comment?`<div class="judge-box"><div class="judge-lbl">심사위원 총평</div><div class="judge-txt">${fb.comment}</div></div>`:''}
      ${fb.strength||fb.improve?`<div class="fb-grid">
        <div class="fb-cell" style="background:var(--ok-bg)">
          <div style="font-size:11px;font-weight:600;color:var(--ok-txt);margin-bottom:4px">잘한 점</div>
          <div style="font-size:12px;color:var(--ok-txt);line-height:1.55">${fb.strength||'-'}</div>
        </div>
        <div class="fb-cell" style="background:var(--err-bg)">
          <div style="font-size:11px;font-weight:600;color:var(--err-txt);margin-bottom:4px">보완할 점</div>
          <div style="font-size:12px;color:var(--err-txt);line-height:1.55">${fb.improve||'-'}</div>
        </div>
      </div>`:''}
      ${kwr.ok.length||kwr.miss.length?`<div class="kw-section">
        <div class="kw-lbl">핵심 키워드 — 포함 ${kwr.ok.length}개 / 누락 ${kwr.miss.length}개</div>
        <div class="kw-row">
          ${kwr.ok.map(k=>`<span class="kw kw-ok">✓ ${k}</span>`).join('')}
          ${kwr.miss.map(k=>`<span class="kw kw-miss">✗ ${k}</span>`).join('')}
        </div>
      </div>`:''}
      <div class="ans-box">
        <div class="ans-lbl">모범 답안</div>
        <div class="ans-txt">${q.a}</div>
        <div class="memo-wrap"><div class="memo-lbl">암기 요약</div><div class="memo-txt">${q.memo}</div></div>
      </div>
    </div>`;
  }

  const allDone=ST.submitted.every(Boolean);
  document.getElementById('practice-inner').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <button class="btn sm" onclick="go('home')">← 목록</button>
      <span style="font-size:14px;font-weight:600;flex:1">${ST.activeSet.title}</span>
    </div>
    <div class="prog-row">${steps}</div>
    <div class="card">
      <div class="q-meta">
        <span class="q-domain" style="${dc}">${q.type} · ${q.sub}</span>
        <span class="q-pts">${q.pts}점</span>
        <span class="q-num">${i+1}/4</span>
      </div>
      <div class="q-txt">${q.q}</div>
      ${body}
      <div id="fb-area"></div>
    </div>
    <div class="nav-row">
      ${i>0?`<button class="btn sm" onclick="moveQ(${i-1})">← 이전</button>`:''}
      ${i<3?`<button class="btn sm" style="margin-left:auto" onclick="moveQ(${i+1})">다음 →</button>`:''}
      ${i===3&&allDone?`<button class="btn pri" style="margin-left:auto" onclick="showSum()">결과 보기 →</button>`:''}
    </div>
    <div id="sum-area"></div>`;
}

function setMode(m){saveAns();ST.inputMode=m;if(m==='text')stopRec();renderQ();}
function saveAns(){
  const el=document.getElementById('ans');if(el)ST.answers[ST.qIdx]=el.value;
  if(ST.inputMode==='voice'&&ST.transcript)ST.answers[ST.qIdx]=ST.transcript;
}
function moveQ(idx){saveAns();ST.qIdx=idx;ST.transcript='';stopRec();renderQ();window.scrollTo(0,0);}
function speakQ(){
  const q=ST.activeQs[ST.qIdx];if(!q)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(q.q);u.lang='ko-KR';u.rate=0.9;
  window.speechSynthesis.speak(u);
}
function stopTTS(){window.speechSynthesis.cancel();}
function toggleRec(){ST.isRec?stopRec():startRec();}
function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Chrome 브라우저에서 사용해 주세요.');return;}
  const r=new SR();r.lang='ko-KR';r.continuous=true;r.interimResults=true;
  r.onresult=e=>{
    let fin='',intr='';
    for(let j=e.resultIndex;j<e.results.length;j++){
      if(e.results[j].isFinal)fin+=e.results[j][0].transcript;
      else intr+=e.results[j][0].transcript;
    }
    if(fin)ST.transcript+=(ST.transcript?' ':'')+fin.trim();
    const box=document.getElementById('t-box');if(box)box.textContent=ST.transcript+(intr?' ('+intr+')':'');
    const st=document.getElementById('v-st');if(st)st.textContent='인식 중...';
  };
  r.onerror=()=>{ST.isRec=false;};
  r.onend=()=>{if(ST.isRec)r.start();};
  ST.rec=r;ST.isRec=true;r.start();
  const btn=document.getElementById('btn-rec');if(btn){btn.className='btn-v rec';btn.textContent='⏹ 녹음 중단';}
}
function stopRec(){if(ST.rec){try{ST.rec.stop();}catch(e){}}ST.isRec=false;ST.rec=null;}
function clearT(){ST.transcript='';const b=document.getElementById('t-box');if(b)b.textContent='(음성 인식 결과가 여기에 표시됩니다)';}
function showOnly(i){
  saveAns();const q=ST.activeQs[i];
  document.getElementById('fb-area').innerHTML=`<div class="ans-box" style="margin-top:10px">
    <div class="ans-lbl">모범 답안</div><div class="ans-txt">${q.a}</div>
    <div class="memo-wrap"><div class="memo-lbl">암기 요약</div><div class="memo-txt">${q.memo}</div></div>
    <div class="kw-row" style="margin-top:8px">${q.kw.map(k=>`<span class="kw" style="background:var(--info-bg);color:var(--info-txt)">${k}</span>`).join('')}</div>
  </div>`;
}
function kwCheck(ans,kw){
  const a=ans.toLowerCase();
  return{ok:kw.filter(k=>a.includes(k.toLowerCase())),miss:kw.filter(k=>!a.includes(k.toLowerCase()))};
}

async function gradeQ(i){
  saveAns();
  const ans=ST.answers[i];
  if(!ans||!ans.trim()){alert('답변을 입력하거나 음성으로 말해주세요.');return;}
  const q=ST.activeQs[i];
  const el=document.getElementById('ans');if(el)el.disabled=true;
  const bg=document.getElementById('btn-g');if(bg)bg.disabled=true;
  document.getElementById('fb-area').innerHTML=`<div class="loading-row">심사위원이 검토 중입니다 <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>`;
  const kwr=kwCheck(ans,q.kw);
  const prompt=`당신은 생활스포츠지도사 2급 구술시험 심사위원입니다. 실제 현장 경력 10년 이상의 전문가로서 채점합니다.

[채점 원칙]
- 수험생이 긴장한 상황에서 말하는 것이므로 표현이 완벽하지 않아도 내용을 이해하고 있다면 충분히 인정합니다.
- 방향이 맞고 핵심을 짚었다면 후하게 채점합니다. 합격 목표 점수(70점)를 기준으로 현실적으로 채점합니다.
- 답변이 짧더라도 핵심 개념을 정확히 말했다면 높은 점수를 줍니다.

[채점 기준 - 반드시 10점 단위로만 채점]
- 100점: 모든 핵심 내용을 정확하고 완벽하게 설명
- 90점: 거의 모든 내용을 정확히 설명, 아주 사소한 부분만 누락
- 80점: 핵심 내용 대부분 포함, 세부 사항 1~2개 누락 또는 약간 부정확
- 70점: 주요 내용은 맞고 이해하고 있음이 분명하나 일부 항목 누락
- 60점: 기본 방향은 맞지만 중요 내용 2~3개 누락
- 50점: 관련 지식이 있으나 핵심 내용 절반 이상 누락
- 40점 이하: 내용이 크게 부족하거나 잘못된 정보 포함

[문제] ${q.q}
[모범 답안] ${q.a}
[핵심 키워드] ${q.kw.join(', ')}
[포함된 키워드] ${kwr.ok.join(', ')||'없음'}
[누락된 키워드] ${kwr.miss.join(', ')||'없음'}
[수험생 답변] ${ans}

위 채점 기준에 따라 10점 단위로 채점하세요. 방향이 맞고 이해도가 있다면 70점 이상을 주세요.

다음 JSON만 출력(다른 텍스트 없이):
{"score":10의배수,"comment":"총평 2문장(장점 먼저)","strength":"잘한점 1문장","improve":"보완점 1문장"}`;

  let sc=70,comment='',strength='',improve='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    let p;
    try{p=JSON.parse(raw);}
    catch(e){
      const ms=raw.match(/"score"\s*:\s*(\d+)/);
      const mc=raw.match(/"comment"\s*:\s*"((?:[^"\\]|\\.)*)"/);
      const mst=raw.match(/"strength"\s*:\s*"((?:[^"\\]|\\.)*)"/);
      const mi=raw.match(/"improve"\s*:\s*"((?:[^"\\]|\\.)*)"/);
      p={score:ms?parseInt(ms[1]):70,comment:mc?mc[1]:'',strength:mst?mst[1]:'',improve:mi?mi[1]:''};
    }
    sc=Math.round(Math.min(100,Math.max(0,parseInt(p.score)||70))/10)*10;
    comment=p.comment||'';strength=p.strength||'';improve=p.improve||'';
  }catch(e){
    const ratio=kwr.ok.length/(q.kw.length||1);
    sc=Math.round(Math.max(50,Math.min(90,ratio*100+20))/10)*10;
    improve=kwr.miss.length?kwr.miss.slice(0,2).join(', ')+' 내용을 보완해 보세요.':'';
  }
  ST.scores[i]=sc;ST.submitted[i]=true;
  ST.feedback[i]={comment,strength,improve};ST.kwRes[i]=kwr;
  stopRec();renderQ();
}

function showSum(){
  const qs=ST.activeQs;
  const weighted=Math.round(qs.reduce((a,q,i)=>a+(ST.scores[i]||0)/100*q.pts,0));
  const pass=weighted>=70;
  ST.results.push({setId:ST.activeSet.id,title:ST.activeSet.title,total:weighted,date:new Date().toLocaleDateString('ko-KR')});
  if(ST.results.length>50)ST.results=ST.results.slice(-50);save();
  const fc=pass?'#1d9e75':'#d85a30';
  document.getElementById('sum-area').innerHTML=`<div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:14px">세트 최종 결과</div>
    <div class="sum-grid">
      <div class="sum-item"><div class="sum-n" style="color:${fc}">${weighted}점</div><div class="sum-l">총점 / 100점</div></div>
      <div class="sum-item"><div class="sum-n" style="color:${fc}">${pass?'합격':'불합격'}</div><div class="sum-l">70점 이상 합격</div></div>
    </div>
    <div class="score-bar" style="height:8px;margin-bottom:14px"><div class="score-fill" style="width:${weighted}%;background:${fc}"></div></div>
    <div class="q-res-grid">
      ${qs.map((q,i)=>{const sc=ST.scores[i]||0;const earn=Math.round(sc/100*q.pts);const c=sc2color(sc);
        return `<div class="q-res-item"><span style="color:var(--text2)">Q${i+1} ${q.type}</span><span style="float:right;font-weight:600;color:${c}">${earn}/${q.pts}점 (${sc}점)</span></div>`;
      }).join('')}
    </div>
    <button class="btn-big sec" style="margin-top:14px" onclick="go('home')">세트 목록으로</button>
  </div>`;
  document.getElementById('sum-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderHistory(){
  const el=document.getElementById('hist-inner');
  if(!ST.results.length){el.innerHTML='<div class="empty">아직 기록이 없습니다.<br>세트를 완료하면 여기에 기록됩니다.</div>';return;}
  el.innerHTML=`<div class="card">`+[...ST.results].reverse().slice(0,20).map(r=>`
    <div class="hist-item">
      <div class="hist-title">${r.title}</div>
      <div class="hist-meta">
        <span class="pill ${r.total>=70?'pill-c':'pill-w'}">${r.total}점 · ${r.total>=70?'합격':'불합격'}</span>
        <span>${r.date}</span>
      </div>
    </div>`).join('')+'</div>';
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
renderHome();
</script>
</body>
